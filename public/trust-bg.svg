<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1B8271" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#1B8271" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#1B8271" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="1200" fill="none"/>
  <circle cx="600" cy="600" r="500" fill="url(#glow)"/>
  <!-- Lotus -->
  <g transform="translate(600,600)" opacity="0.06" fill="#1B8271">
    <ellipse rx="35" ry="140" transform="rotate(0)"/>
    <ellipse rx="35" ry="140" transform="rotate(22.5)"/>
    <ellipse rx="35" ry="140" transform="rotate(45)"/>
    <ellipse rx="35" ry="140" transform="rotate(67.5)"/>
    <ellipse rx="35" ry="140" transform="rotate(90)"/>
    <ellipse rx="35" ry="140" transform="rotate(112.5)"/>
    <ellipse rx="35" ry="140" transform="rotate(135)"/>
    <ellipse rx="35" ry="140" transform="rotate(157.5)"/>
  </g>
  <!-- Concentric rings -->
  <circle cx="600" cy="600" r="80" fill="none" stroke="#1B8271" stroke-opacity="0.05" stroke-width="1.5"/>
  <circle cx="600" cy="600" r="160" fill="none" stroke="#1B8271" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="600" cy="600" r="260" fill="none" stroke="#1B8271" stroke-opacity="0.03" stroke-width="1"/>
  <circle cx="600" cy="600" r="380" fill="none" stroke="#1B8271" stroke-opacity="0.02" stroke-width="0.5"/>
  <!-- Dots -->
  <g fill="#1B8271" fill-opacity="0.03">
    <circle cx="600" cy="200" r="3"/>
    <circle cx="600" cy="1000" r="3"/>
    <circle cx="200" cy="600" r="3"/>
    <circle cx="1000" cy="600" r="3"/>
    <circle cx="317" cy="317" r="2.5"/>
    <circle cx="883" cy="317" r="2.5"/>
    <circle cx="317" cy="883" r="2.5"/>
    <circle cx="883" cy="883" r="2.5"/>
  </g>
</svg>
